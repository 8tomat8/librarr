name: Feature request
description: Suggest an improvement to Librarr's framework, UI, or APIs.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for the **driver framework** (new protocol support, scoring improvements, UI features, API additions) belong here.

        Requests to add or remove a specific indexer endpoint belong on the [librarr-sources](https://github.com/JeremiahM37/librarr-sources) repository.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is painful about the current flow?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to behave? UI mockups or example config welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
